<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="320" viewBox="0 0 1600 320" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e90ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e90ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00bfff;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes float1 {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(5deg); }
      }
      @keyframes float2 {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(-5deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .ball1 { animation: float1 6s ease-in-out infinite; }
      .ball2 { animation: float2 7s ease-in-out infinite; }
      .glow { animation: pulse 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background gradient -->
  <rect width="100%" height="100%" fill="url(#grad1)" />

  <!-- Animated background elements -->
  <circle class="glow" cx="200" cy="80" r="60" fill="rgba(255,255,255,0.1)" />
  <circle class="glow" cx="1400" cy="260" r="80" fill="rgba(255,255,255,0.08)" />

  <!-- Pokéball-inspired animated elements -->
  <g class="ball1" filter="url(#glow)">
    <circle cx="150" cy="100" r="50" fill="rgba(255,255,255,0.1)" />
    <rect x="100" y="95" width="100" height="10" fill="rgba(255,255,255,0.2)" />
    <circle cx="150" cy="100" r="20" fill="rgba(255,255,255,0.15)" />
  </g>

  <g class="ball2" filter="url(#glow)">
    <circle cx="1450" cy="200" r="45" fill="rgba(255,255,255,0.12)" />
    <rect x="1405" y="195" width="90" height="10" fill="rgba(255,255,255,0.18)" />
    <circle cx="1450" cy="200" r="18" fill="rgba(255,255,255,0.14)" />
  </g>

  <!-- Animated wave pattern -->
  <g opacity="0.3">
    <path d="M 0,200 Q 400,160 800,200 T 1600,200" stroke="rgba(255,255,255,0.5)" stroke-width="3" fill="none">
      <animate attributeName="d" 
        values="M 0,200 Q 400,160 800,200 T 1600,200;
                M 0,200 Q 400,240 800,200 T 1600,200;
                M 0,200 Q 400,160 800,200 T 1600,200"
        dur="6s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Main text -->
  <text x="800" y="140" font-family="Bebas Neue, Arial, sans-serif" font-size="96" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.98" filter="url(#glow)">
    Pokédex Atlas
  </text>

  <text x="800" y="200" font-family="Manrope, Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" opacity="0.9">
    Explora criaturas, movimientos y rarezas
  </text>

  <!-- Animated accent line -->
  <rect x="350" y="215" width="900" height="3" fill="rgba(255,255,255,0.4)">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" />
  </rect>
</svg>