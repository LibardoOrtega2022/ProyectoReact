<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="320" viewBox="0 0 1600 320" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#ffb86b"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feBlend in="SourceGraphic" in2="b" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g2)" />
  <g filter="url(#f1)">
    <circle cx="120" cy="160" r="120" fill="rgba(255,255,255,0.06)" />
    <circle cx="1480" cy="80" r="100" fill="rgba(255,255,255,0.05)" />
  </g>

  <!-- abstract pokeball-inspired element (generic, non-copyright) -->
  <g transform="translate(60,40) scale(1.1)">
    <circle cx="400" cy="120" r="96" fill="url(#g1)" stroke="#fff5e6" stroke-width="6" opacity="0.96" />
    <rect x="304" y="120" width="192" height="12" fill="#ffffff" opacity="0.14" transform="rotate(0 400 126)" />
    <circle cx="400" cy="120" r="36" fill="#fff" opacity="0.98" />
    <circle cx="400" cy="120" r="18" fill="#f97316" />
  </g>

  <text x="540" y="190" font-family="Bebas Neue, Arial, sans-serif" font-size="88" fill="#07203a" opacity="0.96">Pokédex Atlas</text>
  <text x="540" y="230" font-family="Manrope, Arial, sans-serif" font-size="20" fill="#07203a" opacity="0.72">Explora criaturas, rarezas y movimientos</text>
</svg>